[package]
name = "cloud_sync_lib"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
tokio = { version = "1", features = ["fs", "rt", "io-util"] }
thiserror = "1.0"
tracing = "0.1"
reqwest = { version = "0.11", features = ["json", "multipart", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
quick-xml = { version = "0.31", features = ["serialize"] }
rust-s3 = "0.33"

[dev-dependencies]
tempfile = "3"
toml = "0.8"
wiremock = "0.6"

