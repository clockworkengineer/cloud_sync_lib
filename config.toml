watch_directory = "./watched_folder"
google_drive_root = "./cloud_simulation/google_drive"
dropbox_root = "./cloud_simulation/dropbox"
onedrive_root = "./cloud_simulation/onedrive"
webdav_root = "./cloud_simulation/webdav"
s3_root = "./cloud_simulation/s3"
sftp_root = "./cloud_simulation/sftp"
nextcloud_root = "./cloud_simulation/nextcloud"
azure_blob_root = "./cloud_simulation/azure_blob"

[google_credentials]
client_id = "PLACEHOLDER_CLIENT_ID"
client_secret = "PLACEHOLDER_CLIENT_SECRET"
refresh_token = "PLACEHOLDER_REFRESH_TOKEN"
destination_folder = ""
enabled = true
sync = true

[dropbox_credentials]
client_id = "PLACEHOLDER_CLIENT_ID"
client_secret = "PLACEHOLDER_CLIENT_SECRET"
refresh_token = "PLACEHOLDER_REFRESH_TOKEN"
destination_folder = ""
enabled = false
sync = true

[onedrive_credentials]
client_id = "PLACEHOLDER_CLIENT_ID"
client_secret = "PLACEHOLDER_CLIENT_SECRET"
refresh_token = "PLACEHOLDER_REFRESH_TOKEN"
destination_folder = ""
enabled = false
sync = true

[webdav_credentials]
url = "http://127.0.0.1:8080"
username = "PLACEHOLDER_USERNAME"
password = "PLACEHOLDER_PASSWORD"
destination_folder = ""
enabled = false
sync = true

[s3_credentials]
bucket = "PLACEHOLDER_BUCKET"
region = "us-east-1"
access_key_id = "PLACEHOLDER_ACCESS_KEY"
secret_access_key = "PLACEHOLDER_SECRET_KEY"
endpoint = "http://127.0.0.1:9000"
destination_folder = ""
enabled = false
sync = true

[sftp_credentials]
host = "127.0.0.1"
port = 22
username = "PLACEHOLDER_USERNAME"
password = "PLACEHOLDER_PASSWORD"
private_key_path = ""
destination_folder = ""
enabled = false
sync = true

[nextcloud_credentials]
url = "http://127.0.0.1:8080"
username = "PLACEHOLDER_USERNAME"
app_password = "PLACEHOLDER_APP_PASSWORD"
destination_folder = ""
enabled = false
sync = true

[box_credentials]
client_id = "your_box_client_id"
client_secret = "your_box_client_secret"
refresh_token = "your_box_refresh_token"
destination_folder = "MySyncFolder"   # Optional: Folder name in Box root
enabled = true
sync = true

[mega_credentials]
email = "your-email@example.com"
password = "your-mega-password"
destination_folder = "PiSync" # Optional sub-folder name (creates it if missing)
enabled = true                # Set to false to disable this provider
sync = true                   # Set to false to disable deletion syncing

